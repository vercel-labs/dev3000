[install]
# 2 days. Company-wide standard.
minimumReleaseAge = 172800
# Bun requires exact package names here; scope globs are not supported.
minimumReleaseAgeExcludes = [
  "@vercel/analytics",
  "@vercel/blob",
  "@vercel/oidc",
  "@vercel/sandbox",
  "@vercel/sdk",
  "@vercel/speed-insights",
  "@workflow/world-vercel",
  "turbo",
]
